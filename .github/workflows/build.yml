name: Build and Release VideoDeduper GPU

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0, v1.1.2 的 tag 时自动触发打包发布

permissions:
  contents: write # 赋予 Action 创建和上传 Release 附件的权限

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔨 Build Application with PyInstaller
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          pyinstaller build_all.spec --noconfirm

      - name: 🗂️ Prepare Release Directory
        run: |
          # 创建一个统一的 GPU 发布文件夹
          mkdir release_gpu
          
          # 将打包出的可执行文件拷贝到文件夹中
          # 注意：请确保你的 build_all.spec 输出在 dist 目录下
          Copy-Item -Path "dist\*" -Destination "release_gpu\" -Recurse -Force

      - name: ⬇️ Download Tool Asset
        run: |
          # 仅下载包含 3 个 EXE 工具的 Tool.zip
          curl -L -o Tool.zip "https://github.com/jamosnet/VideoDeduper/releases/download/v1.0.0-asset/Tool.zip"

      - name: 📂 Extract Tools into Release Folder
        run: |
          # 将工具解压到发布文件夹内的 VideoDedupeTool 子目录（或你指定的目录）
          Expand-Archive -Path Tool.zip -DestinationPath release_gpu\VideoDedupeTool\ -Force

      - name: 🗜️ Create Final GPU Zip Archive
        run: |
          # 将文件夹压缩为最终带 GPU 标识的压缩包
          Compress-Archive -Path "release_gpu\*" -DestinationPath "VideoDeduper_GPU.zip" -Force

      - name: 🚀 Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VideoDeduper_GPU.zip
          generate_release_notes: true